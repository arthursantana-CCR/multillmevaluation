description: "Multi-LLM Evaluation — Lesson Plan Generation with Hallucination Control"

task_type: "generation"

pipeline:
  architecture: sequential # "sequential" | "consensus"

  models:
    - role: generator
      provider: anthropic
      model: "claude-sonnet-4-6"

    - role: reviewer_1
      provider: google
      model: "gemini-2.5-flash"

    - role: reviewer_2
      provider: openai
      model: "gpt-4.1-mini"

    - role: final_reviewer
      provider: anthropic
      model: "claude-sonnet-4-6"

  consensus:
    generators:
      - provider: anthropic
        model: "claude-sonnet-4-6"
      - provider: google
        model: "gemini-2.5-flash"
      - provider: openai
        model: "gpt-4.1-mini"

    aggregator:
      provider: anthropic
      model: "claude-sonnet-4-6"

parameters:
  temperature: 0
  top_p: 1.0
  max_tokens: 1200

system_instruction: |
  You are part of a multi-step AI generation pipeline.

  Follow instructions strictly.
  Output must always follow the required format.
  Do not include any text outside the specified structure.

hallucination_rubric: |
  A hallucination is any content that is not supported by the task, provided inputs, or widely accepted general knowledge.

  Types of hallucination:
  - Unsupported claim: statement not grounded in the task or input
  - Fabricated reference: invented source, citation, or requirement
  - Overgeneralization: conclusion that goes beyond the task requirements
  - Misinterpretation: incorrect reading of the instructional goal or standard

  Reviewer instructions:
  - Identify whether hallucinations are present
  - Classify the type(s)
  - Provide a brief justification
  - Provide a fully corrected version of the answer
  - Do not preserve hallucinated content

  -----------------------------------
  ## OUTPUT FORMAT (STRICT)

  HALLUCINATIONS FOUND: YES or NO

  TYPES: <comma-separated list OR []>

  JUSTIFICATION:
  <Brief explanation>

  CORRECTED ANSWER:
  <Fully corrected answer — MUST always be present and complete>

task: |
  Generate a 55-minute lesson to teach the following standard for middle school students in a traditional classroom setting:

  CCSS.ELA-Literacy.W.7.1 — Write arguments to support claims with clear reasons and relevant evidence, including acknowledging alternate or opposing claims and organizing reasoning logically.

cases:
  - id: "lesson_plan_1"
    input: "N/A"

output_format:
  type: "dual"

  template: |
    You must follow this exact output format.

    Do not include any text outside these sections.

    ### STRUCTURED OUTPUT
    {
      "hallucinations_found": <true or false>,
      "types": <array of strings or []>,
      "justification": <string>
    }

    ### FINAL ANSWER
    If hallucinations are found, provide a corrected version of the answer.

    If NO hallucinations are found, you MUST return the original answer unchanged.
