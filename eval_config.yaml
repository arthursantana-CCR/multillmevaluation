description: "Multi-LLM Evaluation — Lesson Plan Generation with Hallucination Control"

task_type: "evaluation" # "generation" | "evaluation"

pipeline:
  architecture: sequential # "sequential" | "consensus"

  models:
    - role: generator
      provider: anthropic
      model: "claude-sonnet-4-6"

    - role: reviewer_1
      provider: google
      model: "gemini-2.5-flash"

    - role: reviewer_2
      provider: openai
      model: "gpt-4.1-mini"

    - role: final_reviewer
      provider: anthropic
      model: "claude-sonnet-4-6"

  consensus:
    generators:
      - provider: anthropic
        model: "claude-sonnet-4-6"
      - provider: google
        model: "gemini-2.5-flash"
      - provider: openai
        model: "gpt-4.1-mini"

    aggregator:
      provider: anthropic
      model: "claude-sonnet-4-6"

parameters:
  temperature: 0
  top_p: 1.0
  max_tokens: 3500

system_instruction: |
  You are part of a multi-step AI generation pipeline.

  Your output MUST follow this EXACT JSON structure:

  {
    "hallucinations_found": boolean,
    "types": string[],
    "justification": string,
    "corrected_answer": string
  }

  RULES:
  - Output ONLY valid JSON
  - Do NOT include markdown, headings, or explanations
  - Do NOT include "FINAL ANSWER" or any extra text
  - "corrected_answer" MUST always be present
  - If no hallucinations are found, return the original answer unchanged in "corrected_answer"

  Before returning your answer, verify:
  - Is it valid JSON?
  - Does it contain all required fields?
  If not, fix it before returning.

hallucination_rubric: |
  A hallucination is defined as any instance where the model presents information as factual, sourced, or real without verifiable grounding.

  Step 1 — Scope Check
  Before flagging anything, determine whether a statement is an evaluable claim. A statement is evaluable if it:

  Presents information as factual, sourced, or real-world
  Describes something about the input material (e.g., what a student wrote, argued, or cited)
  Makes an inference or judgment about the input material

  The following are not evaluable claims and must be skipped:

  Clearly fictional or instructional examples
  Hypothetical scenarios not presented as real-world facts
  General pedagogical explanations
  Hedged speculation explicitly framed as uncertain

  Important: If a statement mimics a real-world citation — i.e., it includes a year, organization name, statistic, or percentage — it must be treated as a factual claim and evaluated, regardless of context.

  Step 2 — Classification
  For each evaluable claim, check against the subtypes below. Assign all applicable types — more than one may apply.

  A1 — Intrinsic hallucination
  Flag if the output contradicts or distorts something explicitly stated in the input or context.
  Example: the input says the student argued X, but the output claims the student argued the opposite.

  A2 — Extrinsic hallucination
  Flag if the output introduces claims, attributions, or details that are absent from the input with no grounding.
  Example: the output states the student cited a study, but no such citation exists in the input.

  B1 — Factual incorrectness
  Flag if the output states something demonstrably false as fact.
  Example: a well-known fact is stated incorrectly, such as wrong geography or a wrong date.

  B2 — Fabricated information
  Flag if the output invents entities, citations, statistics, studies, or details that do not exist. Any numerical claim (statistic, percentage, quantified result) or citation-like structure (author, year, organization) presented as real must be flagged here unless it can be traced directly to the input.
  Example: "According to the WHO 2019 report mentioned in the essay…" when no such report appears in the input.

  Reviewer instructions:
  - Identify whether hallucinations are present
  - Classify the type(s)
  - Provide a brief justification
  - Provide a fully corrected version of the answer
  - If no hallucinations are found, return the original answer unchanged
  - Do not preserve hallucinated content

task: |
  Evaluate the student text using the CCR Critical Thinking rubric below.

  CCR Critical Thinking Rubric (Levels 1–4). For each subcompetency, assign a level and cite evidence quotes from the student text.

  CRI1 — Identifying, clarifying, and organizing information
  1: Information is disorganized or unclear.
  2: Information is somewhat clear but lacks organization.
  3: Information is clear and organized, but organization or clarity could be improved.
  4: Information is clearly identified, well organized, and easy to follow.

  CRI2 — Assessing validity and quality of information
  1: No attempt to assess the quality or validity of information used.
  2: Some critical assessment of information, but limited or shallow.
  3: Assessment of information is present, but depth or justification could be improved.
  4: Thorough assessment of information’s validity and quality, with clear justification.

  CRI3 — Weighing pros and cons of alternative choices
  1: No consideration of alternative choices or their implications.
  2: Some discussion of alternative choices but lacks depth or balance.
  3: Balanced analysis of pros and cons of alternatives, but depth or coverage could be improved.
  4: Balanced analysis of pros and cons of alternatives, with thoughtful consideration of implications.

  CRI4 — Applying sound reasoning to decision-making
  1: Reasoning is flawed or lacks logical structure.
  2: Reasoning is generally sound but has logical gaps.
  3: Reasoning is sound but minor logical gaps are present.
  4: Strong logical reasoning throughout, with clear and evidence-based decision-making.

  CRI5 — Reflecting critically on one's own reasoning and assumptions
  1: No reflection on personal reasoning or assumptions.
  2: Some acknowledgment of reasoning or assumptions, though limited in depth.
  3: Reflects on and critiques own reasoning and assumptions, but depth could be improved.
  4: Deeply reflects on and critiques own reasoning and assumptions, showing willingness to question and adjust.
  

#cases:
  - id: "student_1"
    input: "I think our school should have a longer recess. Right now it is only 15 minutes, and many students still feel tired when class starts again. If recess were about 25 minutes, students could rest and move their bodies, which might help them focus better in class.

      There are some disadvantages too. If recess is longer, teachers might have less time to finish lessons. Some students might also get too excited and it could take longer for everyone to calm down after recess.

      After thinking about both sides, I believe a slightly longer recess would be best because it helps students rest but still leaves enough time for learning."
