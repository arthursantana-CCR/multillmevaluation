#  - id: "student_3"
#    input: "Student text 3..."

output_format:
  type: "json_only"

  template: |
    You must return ONLY valid JSON in the following format:

    {
      "hallucinations_found": <true or false>,
      "types": <array of strings or []>,
      "justification": <string>,
      "corrected_answer": <string>
    }
