description: "Multi-LLM Evaluation — Lesson Plan Generation with Hallucination Control"

task_type: "generation" # "generation" | "evaluation"

pipeline:
  architecture: consensus # "sequential" | "consensus"

  models:
    - role: generator
      provider: anthropic
      model: "claude-sonnet-4-6"

    - role: reviewer_1
      provider: google
      model: "gemini-2.5-flash"

    - role: reviewer_2
      provider: openai
      model: "gpt-4.1-mini"

    - role: final_reviewer
      provider: anthropic
      model: "claude-sonnet-4-6"

  consensus:
    generators:
      - provider: anthropic
        model: "claude-sonnet-4-6"
      - provider: google
        model: "gemini-2.5-flash"
      - provider: openai
        model: "gpt-4.1-mini"

    aggregator:
      provider: anthropic
      model: "claude-sonnet-4-6"

parameters:
  temperature: 0
  top_p: 1.0
  max_tokens: 7000

system_instruction: |
  You are part of a multi-step AI generation pipeline.

  Your output MUST follow this EXACT JSON structure:

  {
    "hallucinations_found": boolean,
    "types": string[],
    "justification": string,
    "corrected_answer": string
  }

  RULES:
  - Output ONLY valid JSON
  - Do NOT include markdown, headings, or explanations
  - Do NOT include "FINAL ANSWER" or any extra text
  - "corrected_answer" MUST always be present
  - If no hallucinations are found, return the original answer unchanged in "corrected_answer"

  Before returning your answer, verify:
  - Is it valid JSON?
  - Does it contain all required fields?
  If not, fix it before returning.

hallucination_rubric: knowledge/hallucination/rubric.yaml

knowledge:
  ccr:
    critical_thinking: knowledge/ccr/critical_thinking.yaml
    collaboration: knowledge/ccr/collaboration.yaml
    creativity: knowledge/ccr/creativity.yaml
    communication: knowledge/ccr/communication.yaml
    courage: knowledge/ccr/courage.yaml
    resilience: knowledge/ccr/resilience.yaml
    ethics: knowledge/ccr/ethics.yaml
    metacognition: knowledge/ccr/metacognition.yaml

task: |
  Generate a 55-minute lesson (max 800 words) to teach middle school students curiosity, in addition to the following standard, in a traditional classroom setting:
  CCSS.ELA-Literacy.W.7.1 — Write arguments to support claims with clear reasons and relevant evidence, including acknowledging alternate or opposing claims and organizing reasoning logically.

