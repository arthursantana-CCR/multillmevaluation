description: "Multi-LLM Evaluation — Lesson Plan Generation with Hallucination Control"

task_type: "generation" # "generation" | "evaluation"

pipeline:
  architecture: consensus # "sequential" | "consensus"

  models:
    - role: generator
      provider: anthropic
      model: "claude-sonnet-4-6"

    - role: reviewer_1
      provider: google
      model: "gemini-2.5-flash"

    - role: reviewer_2
      provider: openai
      model: "gpt-4.1-mini"

    - role: final_reviewer
      provider: anthropic
      model: "claude-sonnet-4-6"

  consensus:
    generators:
      - provider: anthropic
        model: "claude-sonnet-4-6"
      - provider: google
        model: "gemini-2.5-flash"
      - provider: openai
        model: "gpt-4.1-mini"

    aggregator:
      provider: anthropic
      model: "claude-sonnet-4-6"

parameters:
  temperature: 0
  top_p: 1.0
  max_tokens: 7000

system_instruction: |
  You are part of a multi-step AI generation pipeline.

  Your output MUST follow this EXACT JSON structure:

  {
    "hallucinations_found": boolean,
    "types": string[],
    "justification": string,
    "corrected_answer": string
  }

  RULES:
  - Output ONLY valid JSON
  - Do NOT include markdown, headings, or explanations
  - Do NOT include "FINAL ANSWER" or any extra text
  - "corrected_answer" MUST always be present
  - If no hallucinations are found, return the original answer unchanged in "corrected_answer"

  Before returning your answer, verify:
  - Is it valid JSON?
  - Does it contain all required fields?
  If not, fix it before returning.

hallucination_rubric: knowledge/hallucination/rubric.yaml

knowledge:
  lesson_plan: knowledge/lesson_plan.yaml
  ccr:
    critical_thinking: knowledge/critical_thinking.yaml
    collaboration: knowledge/collaboration.yaml
    creativity: knowledge/creativity.yaml
    communication: knowledge/communication.yaml
    courage: knowledge/courage.yaml
    resilience: knowledge/resilience.yaml
    ethics: knowledge/ethics.yaml
    metacognition: knowledge/meta_learning.yaml

task: |
  You are an expert educator. Use the CCR Critical Thinking framework below to design a 55-minute lesson plan for 7th grade students.

  The lesson must explicitly address each of the following Critical Thinking subcompetencies:
  {{ccr.critical_thinking}}. 
  And follow the following lesson plan: {{lesson_plan}}.

  For each subcompetency (CRI1 through CRI5), include:
  - A specific activity or moment in the lesson that targets it
  - How you would observe or assess it in students

  The lesson topic is: "Should schools have homework?" and should have around 800 words.

