description: "Multi-LLM Evaluation — Lesson Plan Generation with Hallucination Control"

task_type: "generation"

pipeline:
  architecture: sequential # "sequential" | "consensus"

  models:
    - role: generator
      provider: anthropic
      model: "claude-sonnet-4-6"

    - role: reviewer_1
      provider: google
      model: "gemini-2.5-flash"

    - role: reviewer_2
      provider: openai
      model: "gpt-4.1-mini"

    - role: final_reviewer
      provider: anthropic
      model: "claude-sonnet-4-6"

  consensus:
    generators:
      - provider: anthropic
        model: "claude-sonnet-4-6"
      - provider: google
        model: "gemini-2.5-flash"
      - provider: openai
        model: "gpt-4.1-mini"

    aggregator:
      provider: anthropic
      model: "claude-sonnet-4-6"

parameters:
  temperature: 0
  top_p: 1.0
  max_tokens: 3500

system_instruction: |
  You are part of a multi-step AI generation pipeline.

  Your output MUST follow this EXACT JSON structure:

  {
    "hallucinations_found": boolean,
    "types": string[],
    "justification": string,
    "corrected_answer": string
  }

  RULES:
  - Output ONLY valid JSON
  - Do NOT include markdown, headings, or explanations
  - Do NOT include "FINAL ANSWER" or any extra text
  - "corrected_answer" MUST always be present
  - If no hallucinations are found, return the original answer unchanged in "corrected_answer"

  Before returning your answer, verify:
  - Is it valid JSON?
  - Does it contain all required fields?
  If not, fix it before returning.

hallucination_rubric: |
  A hallucination is defined as any instance where the model presents information as factual, sourced, or real without verifiable grounding.

  The following MUST be classified as hallucinations:

  1. Fabricated references:
     - Fake studies, fake statistics, or unverifiable citations
     - Example: "A 2019 study found..." with no real source

  2. Unsupported claims presented as factual:
     - Statements that imply research backing but provide none

  3. Specific numerical claims without verifiable grounding:
     - Statistics, percentages, or quantified results presented as real

  The following are NOT hallucinations:

  - Clearly fictional or instructional examples
  - Hypothetical scenarios not presented as real-world facts
  - General pedagogical explanations

  IMPORTANT:
  If a statement mimics a real-world citation (e.g., includes a year, organization, or statistic),
  it MUST be treated as a factual claim and evaluated for hallucination.

  Reviewer instructions:
  - Identify whether hallucinations are present
  - Classify the type(s)
  - Provide a brief justification
  - Provide a fully corrected version of the answer
  - If no hallucinations are found, return the original answer unchanged
  - Do not preserve hallucinated content

task: |
  Generate a 55-minute lesson to teach the following standard for middle school students in a traditional classroom setting:

  CCSS.ELA-Literacy.W.7.1 — Write arguments to support claims with clear reasons and relevant evidence, including acknowledging alternate or opposing claims and organizing reasoning logically.

cases:
  - id: "lesson_plan_1"
    input: "N/A"

output_format:
  type: "json_only"

  template: |
    You must return ONLY valid JSON in the following format:

    {
      "hallucinations_found": <true or false>,
      "types": <array of strings or []>,
      "justification": <string>,
      "corrected_answer": <string>
    }
