name: Daily Multi-LLM Evaluation

on:
  push:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-evaluation:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
      AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
      AIRTABLE_TABLE_NAME: ${{ secrets.AIRTABLE_TABLE_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # 🔹 Ensure BOTH directories exist
      - name: Ensure results directories exist
        run: |
          mkdir -p results/history
          mkdir -p results_md/history

      - name: Run multi-LLM pipeline
        run: node scripts/run_multillm_pipeline.mjs

      - name: Post results to Airtable
        run: node scripts/post_to_airtable.mjs

      # 🔹 Optional: Debug visibility (very useful)
      - name: Show generated files
        run: |
          echo "=== RESULTS ==="
          ls -R results || true
          echo "=== RESULTS_MD ==="
          ls -R results_md || true

      - name: Commit results back to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 🔹 Add BOTH directories
          git add results/
          git add results_md/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update multi-LLM evaluation results (JSON + MD)"
            git push
          fi
